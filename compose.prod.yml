# Production Compose with optimized builds (Podman Compose compatible)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WG_INTERFACE: ${WG_INTERFACE}
      WG_SERVER_IP: ${WG_SERVER_IP}
      WG_SERVER_PORT: ${WG_SERVER_PORT}
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT}
      WG_NETWORK: ${WG_NETWORK}
      WG_DNS: ${WG_DNS}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      WG_CONNECTED_TIMEOUT_SECONDS: ${WG_CONNECTED_TIMEOUT_SECONDS:-120}
      CORS_ORIGINS: '["https://${DOMAIN}"]'
    volumes:
      - /etc/wireguard:/etc/wireguard
      - backend_data:/var/lib/wgapp
      - caddy_logs:/var/log/caddy:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    read_only: true
    restart: always
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    command: ["uvicorn", "app.main:app", "--host", "127.0.0.1", "--port", "8000"]
    network_mode: "host"

  caddy:
    image: docker.io/library/caddy:2-alpine
    network_mode: "host"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile
      - ./frontend/dist:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    read_only: true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    healthcheck:
      test: ps aux | grep '[c]addy run' >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - backend
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  backend_data:
  caddy_data:
  caddy_config:
  caddy_logs:
