# Production Compose with optimized builds (Podman Compose compatible)

services:
  db:
    image: docker.io/library/postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wireguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wireguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - listen_addresses=127.0.0.1
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=30
      - -c
      - temp_buffers=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wireguard} -d ${POSTGRES_DB:-wireguard}"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: always
    mem_limit: 512m
    pids_limit: 256
    network_mode: "host"

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    command:
      - --path.rootfs=/host
      - --web.listen-address=127.0.0.1:9100
    volumes:
      - /:/host:ro,rslave
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 96m
    network_mode: "host"

  podman_exporter:
    image: quay.io/navidys/prometheus-podman-exporter:v1.21.0
    user: "0:0"
    command:
      - --web.listen-address=127.0.0.1:9882
      - --collector.enable-all
    environment:
      CONTAINER_HOST: unix:///run/podman/podman.sock
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
    volumes:
      - /run/podman/podman.sock:/run/podman/podman.sock:ro
    tmpfs:
      - /tmp
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
    network_mode: "host"

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-wireguard}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-wireguard}?sslmode=disable
    command:
      - --web.listen-address=127.0.0.1:9187
    depends_on:
      - db
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 96m
    network_mode: "host"

  falco:
    image: docker.io/falcosecurity/falco-no-driver:0.39.2
    command:
      - /usr/bin/falco
      - --dry-run
      - -o
      - json_output=true
    volumes:
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - /var/run:/var/run
      - /dev:/host/dev
    tmpfs:
      - /run
      - /tmp
    pid: host
    privileged: true
    restart: "no"
    mem_limit: 512m
    pids_limit: 256
    profiles: ["security"]
    network_mode: "host"

  falcosidekick:
    image: docker.io/falcosecurity/falcosidekick:2.33.0
    environment:
      LISTENPORT: 2801
      PROMETHEUSMETRICS: "true"
      DEBUG: "false"
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 96m
    profiles: ["security"]
    network_mode: "host"

  crowdsec:
    image: docker.io/crowdsecurity/crowdsec:v1.7.7
    environment:
      COLLECTIONS: crowdsecurity/linux crowdsecurity/sshd
      DISABLE_ONLINE_API: "true"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
      - /etc:/host/etc:ro
    command:
      - -c
      - /etc/crowdsec/config.yaml
    restart: always
    mem_limit: 256m
    pids_limit: 256
    profiles: ["security"]
    network_mode: "host"

  trivy_server:
    image: docker.io/aquasec/trivy:0.69.3
    command:
      - server
      - --listen
      - 127.0.0.1:4954
      - --cache-dir
      - /var/lib/trivy
    volumes:
      - trivy_cache:/var/lib/trivy
    restart: on-failure
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 192m
    profiles: ["security"]
    network_mode: "host"

  parca:
    image: ghcr.io/parca-dev/parca:v0.27.1
    command:
      - /parca
      - --http-address=127.0.0.1:7070
      - --storage-path=/var/lib/parca
    volumes:
      - parca_data:/var/lib/parca
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    profiles: ["security"]
    network_mode: "host"

  ebpf_agent:
    image: ghcr.io/parca-dev/parca-agent:v0.47.0
    command:
      - --http-address=127.0.0.1:9435
      - --log-level=info
      - --remote-store-address=${PARCA_REMOTE_STORE_ADDRESS:-127.0.0.1:7070}
      - --remote-store-insecure
      - --remote-store-grpc-max-connection-retries=1
      - --remote-store-grpc-connection-timeout=2s
      - --remote-store-grpc-startup-backoff-time=5s
      - --profiling-duration=5m
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/sys:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    depends_on:
      - parca
    restart: always
    mem_limit: 192m
    pids_limit: 256
    profiles: ["security"]
    network_mode: "host"

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    environment:
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DATABASE_URL: ${DATABASE_URL}
      WG_INTERFACE: ${WG_INTERFACE}
      WG_SERVER_IP: ${WG_SERVER_IP}
      WG_SERVER_PORT: ${WG_SERVER_PORT}
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT}
      WG_HELPER_URL: http://127.0.0.1:9789
      WG_HELPER_TOKEN: ${API_SECRET_KEY}
      WG_NETWORK: ${WG_NETWORK}
      WG_DNS: ${WG_DNS}
      WG_CLIENT_ALLOWED_IPS: ${WG_CLIENT_ALLOWED_IPS:-}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      WG_CONNECTED_TIMEOUT_SECONDS: ${WG_CONNECTED_TIMEOUT_SECONDS:-120}
      METRICS_ENDPOINT_URL: ${METRICS_ENDPOINT_URL:-http://127.0.0.1:2019/metrics}
      NODE_EXPORTER_ENDPOINT_URL: ${NODE_EXPORTER_ENDPOINT_URL:-http://127.0.0.1:9100/metrics}
      PODMAN_EXPORTER_ENDPOINT_URL: ${PODMAN_EXPORTER_ENDPOINT_URL:-http://127.0.0.1:9882/metrics}
      POSTGRES_EXPORTER_ENDPOINT_URL: ${POSTGRES_EXPORTER_ENDPOINT_URL:-http://127.0.0.1:9187/metrics}
      PARCA_SERVER_ENDPOINT_URL: ${PARCA_SERVER_ENDPOINT_URL:-http://127.0.0.1:7070}
      EBPF_EXPORTER_ENDPOINT_URL: ${EBPF_EXPORTER_ENDPOINT_URL:-http://127.0.0.1:9435/metrics}
      PARCA_REMOTE_STORE_ADDRESS: ${PARCA_REMOTE_STORE_ADDRESS:-127.0.0.1:7070}
      FALCOSIDEKICK_ENDPOINT_URL: ${FALCOSIDEKICK_ENDPOINT_URL:-http://127.0.0.1:2801/metrics}
      CROWDSEC_ENDPOINT_URL: ${CROWDSEC_ENDPOINT_URL:-http://127.0.0.1:8080/health}
      TRIVY_SERVER_ENDPOINT_URL: ${TRIVY_SERVER_ENDPOINT_URL:-http://127.0.0.1:4954/version}
      WAZUH_API_ENDPOINT_URL: ${WAZUH_API_ENDPOINT_URL:-}
      FLEET_API_ENDPOINT_URL: ${FLEET_API_ENDPOINT_URL:-}
      OSQUERY_EXPORTER_ENDPOINT_URL: ${OSQUERY_EXPORTER_ENDPOINT_URL:-}
      APP_LOG_PATH: /var/log/wg/backend.log
      SYSTEM_LOG_PATH: /host/var/log/dpkg.log
      CORS_ORIGINS: '["https://${DOMAIN}"]'
    volumes:
      - /etc/wireguard:/etc/wireguard
      - backend_data:/var/lib/wgapp
      - backend_app_logs:/var/log/wg
      - caddy_logs:/var/log/caddy:ro
      - /var/log:/host/var/log:ro
      - ./docs/security:/app/docs/security:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    read_only: true
    restart: always
    init: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 384m
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    command: ["uvicorn", "app.main:app", "--host", "127.0.0.1", "--port", "8000"]
    # Podman Compose 1.0.6 can break host-network service startup when app-tier
    # containers are chained with depends_on/--requires.
    network_mode: "host"
    pid: "host"

  wg-helper:
    build:
      context: ./backend
      dockerfile: Containerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    environment:
      WG_HELPER_TOKEN: ${API_SECRET_KEY}
      API_SECRET_KEY: ${API_SECRET_KEY}
      RUN_AS_ROOT: "1"
    volumes:
      - /etc/wireguard:/etc/wireguard
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    read_only: true
    restart: always
    init: true
    command: ["uvicorn", "app.wg_helper_main:app", "--host", "127.0.0.1", "--port", "9789"]
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    network_mode: "host"

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine@sha256:a1b7e624f860619cea121bdbc5dec2e112401666298c6507c6793b0a3ee6fc8e
    network_mode: "host"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile
      - ./frontend/dist:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    read_only: true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
    healthcheck:
      test: ps aux | grep '[c]addy run' >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  crowdsec_data:
  trivy_cache:
  parca_data:
  backend_data:
  backend_app_logs:
  caddy_data:
  caddy_config:
  caddy_logs:
