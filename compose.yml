services:
  # PostgreSQL Database
  db:
    image: docker.io/library/postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wireguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-wireguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - wireguard_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wireguard}:${POSTGRES_PASSWORD:-changeme}@127.0.0.1:5432/${POSTGRES_DB:-wireguard}
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_SERVER_IP: ${WG_SERVER_IP:-10.0.0.1}
      WG_SERVER_PORT: ${WG_SERVER_PORT:-443}
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY}
      WG_SERVER_PRIVATE_KEY: ${WG_SERVER_PRIVATE_KEY}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT}
      WG_NETWORK: ${WG_NETWORK:-10.0.0.0/24}
      WG_DNS: ${WG_DNS:-1.1.1.1,8.8.8.8}
      API_SECRET_KEY: ${API_SECRET_KEY}
      APP_LOG_PATH: /var/log/wg/backend.log
      SYSTEM_LOG_PATH: /host/var/log/dpkg.log
      CORS_ORIGINS: '["https://${DOMAIN}","http://localhost:5173"]'
    volumes:
      - ./backend:/app
      - ./backend/logs:/var/log/wg
      - /etc/wireguard:/etc/wireguard
      - /var/log:/host/var/log:ro
      - caddy_logs:/var/log/caddy:ro
    depends_on:
      - db
    network_mode: "host"
    restart: unless-stopped
    # Required for host-level WireGuard operations
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_URL: /api
    networks:
      - wireguard_network
    restart: unless-stopped

  # Caddy Reverse Proxy
  caddy:
    image: docker.io/library/caddy:2.11.2-alpine@sha256:a1b7e624f860619cea121bdbc5dec2e112401666298c6507c6793b0a3ee6fc8e
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - backend
      - frontend
    networks:
      - wireguard_network
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  wireguard_network:
    driver: bridge
